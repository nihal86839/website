<!DOCTYPE html>
<html lang="en" data-theme="gamer">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says — NihalZone</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .game-container { max-width: 500px; margin: 0 auto; padding: 20px; background: var(--bg-card); border: 1px solid var(--color-border); border-radius: 16px; box-shadow: var(--glow-primary); text-align: center; }
    .simon-board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 30px auto; max-width: 300px; border-radius: 50%; overflow: hidden; transform: rotate(45deg); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .simon-btn { width: 140px; height: 140px; border: none; cursor: pointer; transition: 0.1s; opacity: 0.6; }
    .simon-btn.active { opacity: 1; transform: scale(0.95); box-shadow: inset 0 0 20px rgba(255,255,255,0.5); }
    #btn-0 { background: #ff0040; border-top-left-radius: 100%; }
    #btn-1 { background: #00ff88; border-top-right-radius: 100%; }
    #btn-2 { background: #00ccff; border-bottom-left-radius: 100%; }
    #btn-3 { background: #ffcc00; border-bottom-right-radius: 100%; }
    .stats { font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 10px; color: var(--color-text); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><div class="logo-icon">⚡</div>NIHALZONE</a>
    <div class="navbar-actions">
      <a href="online_games.html" class="btn btn-outline btn-sm">Back</a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container" style="padding-top:20px;padding-bottom:80px;">
      <div class="game-container">
        <h2 style="color:var(--color-primary);font-family:var(--font-heading);margin-bottom:10px;">SIMON SAYS</h2>
        
        <div class="stats">Level: <span id="levelVal">0</span></div>
        <p id="statusMsg" style="color:var(--color-text-muted);height:20px;">Press Start</p>

        <div class="simon-board">
          <button class="simon-btn" id="btn-0" onclick="playerClick(0)"></button>
          <button class="simon-btn" id="btn-1" onclick="playerClick(1)"></button>
          <button class="simon-btn" id="btn-2" onclick="playerClick(2)"></button>
          <button class="simon-btn" id="btn-3" onclick="playerClick(3)"></button>
        </div>

        <button class="btn btn-primary" id="startBtn" onclick="initGame()">▶️ Start Game</button>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    NZ.initTheme();

    let sequence = [];
    let playerSequence = [];
    let level = 0;
    let isPlayerTurn = false;

    function initGame() {
      sequence = [];
      level = 0;
      document.getElementById('startBtn').style.display = 'none';
      nextLevel();
    }

    function nextLevel() {
      playerSequence = [];
      level++;
      document.getElementById('levelVal').textContent = level;
      document.getElementById('statusMsg').textContent = 'Watch carefully...';
      isPlayerTurn = false;
      
      sequence.push(Math.floor(Math.random() * 4));
      
      playSequence();
    }

    function playSequence() {
      let i = 0;
      const interval = setInterval(() => {
        activateButton(sequence[i]);
        i++;
        if (i >= sequence.length) {
          clearInterval(interval);
          setTimeout(() => {
            document.getElementById('statusMsg').textContent = 'Your turn!';
            isPlayerTurn = true;
          }, 500);
        }
      }, 800);
    }

    function activateButton(id) {
      const btn = document.getElementById('btn-' + id);
      btn.classList.add('active');
      setTimeout(() => btn.classList.remove('active'), 300);
    }

    function playerClick(id) {
      if (!isPlayerTurn) return;
      
      activateButton(id);
      playerSequence.push(id);
      
      const currentMove = playerSequence.length - 1;
      
      if (playerSequence[currentMove] !== sequence[currentMove]) {
        gameOver();
        return;
      }
      
      if (playerSequence.length === sequence.length) {
        isPlayerTurn = false;
        document.getElementById('statusMsg').textContent = 'Good! Get ready...';
        setTimeout(nextLevel, 1000);
      }
    }

    function gameOver() {
      document.getElementById('statusMsg').textContent = 'Game Over! You reached level ' + level;
      document.getElementById('startBtn').style.display = 'inline-flex';
      document.getElementById('startBtn').textContent = 'Play Again';
      isPlayerTurn = false;
      
      // Flash red
      document.body.style.background = '#ff0040';
      setTimeout(() => document.body.style.background = '', 200);
    }
  </script>
</body>
</html>
