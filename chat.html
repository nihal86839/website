<!DOCTYPE html>
<html lang="en" data-theme="gamer">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat — NihalZone</title>
  <meta name="description" content="Chat with the NihalZone community in real time.">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; }
    .chat-page { display: flex; flex-direction: column; height: 100vh; }
    .chat-topbar { height: 64px; background: var(--navbar-bg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; position: relative; z-index: 100; }
    .chat-body { display: flex; flex: 1; overflow: hidden; }
    .chat-sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; flex-shrink: 0; }
    .chat-sidebar-header { padding: 16px; border-bottom: 1px solid var(--color-border); font-family: var(--font-heading); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: var(--color-primary); }
    .online-users { flex: 1; overflow-y: auto; padding: 8px; }
    .online-user-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .online-user-item:hover { background: var(--bg-card-hover); }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--color-border); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; }
    .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg-row { display: flex; gap: 10px; animation: fadeInUp 0.2s ease; }
    .msg-row.own { flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 700; font-size: 0.8rem; color: white; flex-shrink: 0; cursor: pointer; position: relative; }
    .msg-content { max-width: 65%; }
    .msg-name { font-family: var(--font-heading); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: var(--color-text-muted); margin-bottom: 3px; }
    .msg-row.own .msg-name { text-align: right; }
    .msg-bubble { padding: 9px 13px; border-radius: 12px; font-size: 0.88rem; line-height: 1.5; word-break: break-word; }
    .msg-row.own .msg-bubble { background: var(--gradient-primary); color: white; border-radius: 12px 4px 12px 12px; }
    .msg-row:not(.own) .msg-bubble { background: var(--bg-card); border: 1px solid var(--color-border); color: var(--color-text); border-radius: 4px 12px 12px 12px; }
    .msg-bubble.deleted { opacity: 0.4; font-style: italic; }
    .msg-time { font-size: 0.65rem; color: var(--color-text-muted); margin-top: 3px; }
    .msg-row.own .msg-time { text-align: right; }
    .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--color-border); background: var(--bg-secondary); display: flex; gap: 10px; align-items: flex-end; }
    .chat-input-box { flex: 1; padding: 10px 16px; background: var(--bg-primary); border: 1px solid var(--color-border); border-radius: 20px; color: var(--color-text); font-family: var(--font-body); font-size: 0.9rem; outline: none; resize: none; max-height: 100px; line-height: 1.4; transition: all 0.3s; }
    .chat-input-box:focus { border-color: var(--color-border-bright); box-shadow: 0 0 10px rgba(157,0,255,0.2); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--gradient-primary); border: none; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; box-shadow: var(--glow-primary); }
    .send-btn:hover { transform: scale(1.1); }
    .system-msg { text-align: center; font-size: 0.72rem; color: var(--color-text-muted); font-style: italic; padding: 4px 0; }
    .blocked-banner { background: rgba(255,0,64,0.1); border: 1px solid rgba(255,0,64,0.3); border-radius: 8px; padding: 12px 16px; margin: 12px 16px; color: #ff4757; font-family: var(--font-heading); font-size: 0.8rem; text-align: center; }
    @media(max-width:640px) { .chat-sidebar { display: none; } }
  </style>
</head>
<body data-theme="gamer">
  <canvas id="matrixCanvas" class="matrix-canvas"></canvas>

  <div class="chat-page">
    <!-- Top Bar -->
    <div class="chat-topbar">
      <a href="index.html" class="navbar-brand" style="font-size:1.1rem;"><div class="logo-icon" style="width:30px;height:30px;font-size:1rem;">⚡</div>NIHALZONE</a>
      <div style="flex:1;"></div>
      <div class="theme-toggle">
        <button class="theme-btn" data-theme="gamer">🎮</button>
        <button class="theme-btn" data-theme="hacker">💻</button>
        <button class="theme-btn" data-theme="light">☀️</button>
      </div>
      <a href="index.html" class="btn btn-outline btn-sm">🏠 Home</a>
      <div data-auth="true" class="hidden" style="display:flex;align-items:center;gap:8px;">
        <div class="user-dropdown-container" id="profileDropdownContainer">
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px;" id="profileDropdownToggle">
            <div class="user-avatar" id="navUserAvatar" style="width:32px;height:32px;font-size:0.8rem;border-radius:8px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;overflow:hidden;">U</div>
            <span id="navUserName" style="font-family:var(--font-heading);font-size:0.75rem;"></span>
            <span>▼</span>
          </div>
          <div class="user-dropdown-menu">
            <button class="dropdown-item" onclick="openProfileModal()">⚙️ Edit Profile</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-action="logout" style="color:var(--color-secondary);">🚪 Logout</button>
          </div>
        </div>
      </div>
      <a href="login.html" class="btn btn-primary btn-sm" data-auth="false">Login to Chat</a>
    </div>

    <div class="chat-body">
      <!-- Sidebar: Online Users -->
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">🟢 ONLINE USERS</div>
        <div class="online-users" id="onlineUsers"></div>
      </div>

      <!-- Main Chat -->
      <div class="chat-main">
        <div class="chat-header">
          <div>
            <div style="font-family:var(--font-heading);font-size:0.9rem;font-weight:700;color:var(--color-primary);">💬 GLOBAL CHAT</div>
            <div style="font-size:0.72rem;color:var(--color-text-muted);" id="onlineCount">Loading...</div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" onclick="scrollToBottom()">⬇ Latest</button>
            <button id="donateBtn" class="btn btn-sm" style="background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;">💛 Donate</button>
            <button id="supportBtn" class="btn btn-outline btn-sm">🎧 Support</button>
          </div>
        </div>

        <div id="blockedBanner" class="blocked-banner hidden">
          🚫 Your account has been blocked by admin. You cannot send messages.
        </div>

        <div class="messages-area" id="messagesArea">
          <div class="system-msg">Welcome to NihalZone Global Chat! Be respectful 🙏</div>
        </div>

        <div class="chat-input-area" id="chatInputArea">
          <div id="loginPrompt" class="hidden" style="flex:1;text-align:center;color:var(--color-text-muted);font-size:0.85rem;">
            <a href="login.html" style="color:var(--color-primary);font-family:var(--font-heading);">Login to join the chat →</a>
          </div>
          <textarea class="chat-input-box" id="chatInput" placeholder="Type a message... (Enter to send)" rows="1" style="display:none;" maxlength="500"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" style="display:none;">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const session = NZ.getSession();
    let lastMsgCount = 0;
    let pollInterval = null;
    let contextMenu = null;

    function init() {
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const loginPrompt = document.getElementById('loginPrompt');

      if (session) {
        input.style.display = 'block';
        sendBtn.style.display = 'flex';
        loginPrompt.classList.add('hidden');

        if (session.isBlocked) {
          document.getElementById('blockedBanner').classList.remove('hidden');
          input.disabled = true;
          sendBtn.disabled = true;
        }
      } else {
        input.style.display = 'none';
        sendBtn.style.display = 'none';
        loginPrompt.classList.remove('hidden');
      }

      loadMessages(true);
      loadOnlineUsers();
      pollInterval = setInterval(() => { loadMessages(false); loadOnlineUsers(); }, 2000);

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
      });
    }

    function loadMessages(scrollBottom) {
      const msgs = NZ.getMessages().filter(m => !m.isDeleted || NZ.isAdmin());
      const area = document.getElementById('messagesArea');
      const atBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 60;

      if (msgs.length === lastMsgCount && !scrollBottom) return;
      lastMsgCount = msgs.length;

      const visibleMsgs = msgs.slice(-100);
      area.innerHTML = `<div class="system-msg">Welcome to NihalZone Global Chat! Be respectful 🙏</div>` +
        visibleMsgs.map(m => {
          const isOwn = session && m.senderId === session.id;
          const isDeleted = m.isDeleted;
          return `
          <div class="msg-row ${isOwn ? 'own' : ''}">
            <div class="msg-avatar" style="background:${stringToGradient(m.senderId)}"
              onclick="showUserCtxMenu(event,'${m.senderId}','${NZ.sanitize(m.senderName)}')"
              title="Click for options">
              ${(m.avatar || m.senderName[0]).toUpperCase()}
            </div>
            <div class="msg-content">
              <div class="msg-name">${NZ.sanitize(m.senderName)}${isOwn ? ' (You)' : ''}</div>
              <div class="msg-bubble ${isDeleted ? 'deleted' : ''}">${isDeleted ? '[Message deleted]' : NZ.sanitize(m.text)}</div>
              <div class="msg-time">${NZ.formatTime(m.timestamp)}
                ${NZ.isAdmin() && !isDeleted ? `<button onclick="adminDeleteMsg('${m.id}')" style="background:none;border:none;color:#ff4757;cursor:pointer;font-size:0.7rem;margin-left:6px;">🗑 Delete</button>` : ''}
              </div>
            </div>
          </div>`;
        }).join('');

      if (scrollBottom || atBottom) scrollToBottom();
    }

    function loadOnlineUsers() {
      const users = NZ.getUsers().filter(u => !u.isBlocked);
      const container = document.getElementById('onlineUsers');
      const items = [];
      if (NZ.getSession()) {
        const s = NZ.getSession();
        items.push(`
          <div class="online-user-item">
            <div class="msg-avatar" style="background:${stringToGradient(s.id)};width:32px;height:32px;font-size:0.75rem;">${s.username[0].toUpperCase()}</div>
            <div>
              <div style="font-size:0.8rem;font-family:var(--font-heading);color:var(--color-primary);">${NZ.sanitize(s.username)}</div>
              <div style="font-size:0.65rem;color:#00ff88;">● Online (You)</div>
            </div>
          </div>`);
      }
      users.slice(0, 15).forEach(u => {
        if (session && u.id === session.id) return;
        items.push(`
          <div class="online-user-item" onclick="showUserCtxMenu(event,'${u.id}','${NZ.sanitize(u.username)}')">
            <div class="msg-avatar" style="background:${stringToGradient(u.id)};width:32px;height:32px;font-size:0.75rem;">${u.username[0].toUpperCase()}</div>
            <div>
              <div style="font-size:0.8rem;font-family:var(--font-heading);color:var(--color-text);">${NZ.sanitize(u.username)}</div>
              <div style="font-size:0.65rem;color:${u.isBlocked ? '#ff4757' : 'var(--color-text-muted)'};">${u.isBlocked ? '🚫 Blocked' : '● Member'}</div>
            </div>
          </div>`);
      });
      container.innerHTML = items.join('') || '<div style="padding:16px;color:var(--color-text-muted);font-size:0.8rem;">No users yet</div>';
      document.getElementById('onlineCount').textContent = `${users.length + 1} members`;
    }

    function sendMessage() {
      if (!session) { window.location.href = 'login.html'; return; }
      if (session.isBlocked) { showToast('You are blocked from chatting.', 'error'); return; }
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      NZ.addMessage(session.id, session.username, text, session.username[0]);
      input.value = '';
      input.style.height = 'auto';
      loadMessages(true);
    }

    function scrollToBottom() {
      const area = document.getElementById('messagesArea');
      area.scrollTop = area.scrollHeight;
    }

    function showUserCtxMenu(e, userId, username) {
      e.preventDefault();
      e.stopPropagation();
      if (!session) return;
      if (contextMenu) contextMenu.remove();
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      const rect = e.target.getBoundingClientRect();
      menu.style.left = (rect.left + window.scrollX) + 'px';
      menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
      menu.innerHTML = `
        <div class="context-item" onclick="openReportModal('${userId}','${username}')">🚨 Report User</div>
        ${session.isAdmin ? `
          <div class="context-item danger" onclick="adminToggleBlock('${userId}','${username}')">🚫 Block/Unblock</div>
          <div class="context-item" onclick="adminLoginAs('${userId}')">👁 Login As</div>
        ` : ''}`;
      document.body.appendChild(menu);
      contextMenu = menu;
      setTimeout(() => {
        document.addEventListener('click', () => { menu.remove(); contextMenu = null; }, { once: true });
      }, 0);
    }

    function adminToggleBlock(userId, username) {
      const user = NZ.getUserById(userId);
      const block = !user?.isBlocked;
      NZ.blockUser(userId, block);
      showToast(`${username} ${block ? 'blocked' : 'unblocked'}!`, block ? 'error' : 'success');
      if (contextMenu) { contextMenu.remove(); contextMenu = null; }
      loadOnlineUsers();
    }

    function adminDeleteMsg(msgId) {
      NZ.deleteMessage(msgId);
      loadMessages(false);
      showToast('Message deleted.', 'success');
    }

    function stringToGradient(str) {
      let hash = 0;
      for (let c of (str || '')) hash = c.charCodeAt(0) + ((hash << 5) - hash);
      const hue = Math.abs(hash) % 360;
      return `linear-gradient(135deg, hsl(${hue},80%,40%), hsl(${(hue + 60) % 360},80%,50%))`;
    }

    init();
    window.addEventListener('beforeunload', () => clearInterval(pollInterval));
  </script>
</body>
</html>
