<!DOCTYPE html>
<html lang="en" data-theme="gamer">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — NihalZone</title>
  <meta name="description" content="Join NihalZone — Gaming, hacking tools, videos, music and more!">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <canvas id="matrixCanvas" class="matrix-canvas"></canvas>

  <div class="auth-page">
    <div class="grid-bg"></div>
    <div id="particles" class="particles"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <div class="auth-title">JOIN THE ZONE</div>
        <div class="auth-subtitle">Create your account. Enter the realm.</div>
      </div>

      <!-- Theme Toggle -->
      <div class="theme-toggle" style="margin-bottom:24px;justify-content:center;">
        <button class="theme-btn active" data-theme="gamer">🎮 GAMER</button>
        <button class="theme-btn" data-theme="hacker">💻 HACKER</button>
        <button class="theme-btn" data-theme="light">☀️ LIGHT</button>
      </div>

      <div id="alertBox"></div>

      <!-- STEP 1: Registration Form -->
      <form id="signupForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="regUsername" class="form-control" placeholder="GamerKing99" required minlength="3" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="regConfirmPassword" class="form-control" placeholder="Repeat password" required>
        </div>

        <!-- Password Strength -->
        <div style="margin-bottom:16px;">
          <div style="font-size:0.7rem;color:var(--color-text-muted);margin-bottom:6px;font-family:var(--font-heading);letter-spacing:0.1em;">PASSWORD STRENGTH</div>
          <div class="progress-bar">
            <div class="progress-fill" id="pwdStrengthBar" style="width:0%"></div>
          </div>
          <div id="pwdStrengthLabel" style="font-size:0.7rem;color:var(--color-text-muted);margin-top:4px;"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupBtn">
          ⚡ NEXT STEP
        </button>
      </form>

      <!-- STEP 2: OTP Form -->
      <form id="otpForm" class="hidden" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Enter 6-Digit OTP</label>
          <input type="text" id="otpInput" class="form-control" placeholder="123456" required maxlength="6" style="text-align:center;font-size:1.5rem;letter-spacing:0.5em;font-family:var(--font-mono);">
        </div>
        <p style="font-size:0.8rem;color:var(--color-text-muted);text-align:center;margin-bottom:16px;">
          An OTP has been sent to your email address (simulated).
        </p>
        <button type="submit" class="btn btn-success btn-block btn-lg" id="verifyBtn">
          ✅ VERIFY & CREATE ACCOUNT
        </button>
        <div class="auth-switch" style="margin-top:16px;">
          <a href="#" id="resendOtpBtn">Resend OTP</a> | <a href="#" id="backToSignupBtn">Cancel</a>
        </div>
      </form>

      <div class="divider"></div>

      <div class="auth-switch">
        Already a member? <a href="login.html">Login →</a>
      </div>
      <div class="auth-switch" style="margin-top:10px;">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    if (NZ.isLoggedIn()) window.location.href = 'index.html';

    // Theme logic
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => NZ.setTheme(btn.dataset.theme));
    });
    NZ.initTheme();

    let pendingUserData = null;
    let currentOTP = null;

    // Password strength
    document.getElementById('regPassword').addEventListener('input', function() {
      const val = this.value;
      const bar = document.getElementById('pwdStrengthBar');
      const label = document.getElementById('pwdStrengthLabel');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = [
        { pct: '0%', color: '', text: '' },
        { pct: '20%', color: '#ff0040', text: 'Very Weak' },
        { pct: '40%', color: '#ff6b00', text: 'Weak' },
        { pct: '60%', color: '#ffa500', text: 'Fair' },
        { pct: '80%', color: '#00ccff', text: 'Good' },
        { pct: '100%', color: '#00ff88', text: 'Strong 💪' },
      ];
      const lvl = levels[strength] || levels[0];
      bar.style.width = lvl.pct;
      bar.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color = lvl.color;
    });

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = '';

      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;

      if (password !== confirm) {
        alertBox.innerHTML = `<div class="alert alert-danger"><span>❌</span>Passwords do not match!</div>`;
        return;
      }

      // Check if user already exists BEFORE sending OTP
      const existing = NZ.getUsers().find(u => u.email === email);
      if (existing) {
        alertBox.innerHTML = `<div class="alert alert-danger"><span>❌</span>Email already registered!</div>`;
        return;
      }

      // Save pending data and show OTP screen
      pendingUserData = { username, email, password };
      
      document.getElementById('signupForm').classList.add('hidden');
      document.getElementById('otpForm').classList.remove('hidden');
      
      sendOTP();
    });

    function sendOTP() {
      currentOTP = NZ.generateOTP();
      // Simulate sending email by showing a toast with the code
      showToast(`SIMULATED EMAIL: Your OTP is ${currentOTP}`, 'info', 10000);
      document.getElementById('otpInput').value = '';
      document.getElementById('otpInput').focus();
    }

    document.getElementById('resendOtpBtn').addEventListener('click', (e) => {
      e.preventDefault();
      sendOTP();
    });

    document.getElementById('backToSignupBtn').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('otpForm').classList.add('hidden');
      document.getElementById('signupForm').classList.remove('hidden');
      pendingUserData = null;
      currentOTP = null;
    });

    document.getElementById('otpForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const inputOTP = document.getElementById('otpInput').value.trim();
      const alertBox = document.getElementById('alertBox');
      const btn = document.getElementById('verifyBtn');

      if (inputOTP !== currentOTP) {
        alertBox.innerHTML = `<div class="alert alert-danger"><span>❌</span>Invalid OTP! Please try again.</div>`;
        return;
      }

      alertBox.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      setTimeout(() => {
        const result = NZ.createUser(pendingUserData);
        if (result.error) {
          alertBox.innerHTML = `<div class="alert alert-danger"><span>❌</span>${result.error}</div>`;
          btn.disabled = false;
          btn.textContent = '✅ VERIFY & CREATE ACCOUNT';
          return;
        }
        
        // Add otpVerified flag
        NZ.updateUser(result.user.id, { otpVerified: true });
        result.user.otpVerified = true;
        NZ.setSession(result.user);
        
        showToast('Account created! Welcome to NihalZone, ' + pendingUserData.username + '!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      }, 700);
    });
  </script>
</body>
</html>
