<!DOCTYPE html>
<html lang="en" data-theme="gamer">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NihalZone</title>
  <meta name="description" content="Login to NihalZone — Your ultimate gaming and hacking hub.">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <canvas id="matrixCanvas" class="matrix-canvas"></canvas>

  <div class="auth-page">
    <div class="grid-bg"></div>
    <div id="particles" class="particles"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <div class="auth-title glitch-text">NIHALZONE</div>
        <div class="auth-subtitle">Enter the zone. Access granted.</div>
      </div>

      <!-- Theme Toggle -->
      <div class="theme-toggle" style="margin-bottom:24px;justify-content:center;">
        <button class="theme-btn" data-theme="gamer">🎮 GAMER</button>
        <button class="theme-btn" data-theme="hacker">💻 HACKER</button>
        <button class="theme-btn" data-theme="light">☀️ LIGHT</button>
      </div>

      <div id="alertBox"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required style="padding-right:48px">
            <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--color-text-muted);cursor:pointer;font-size:1.1rem;">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          🚀 ENTER THE ZONE
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-switch">
        New here? <a href="signup.html">Create Account →</a>
      </div>
      <div class="auth-switch" style="margin-top:10px;">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    // Redirect if already logged in
    if (NZ.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('loginPassword');
      const isText = pwd.type === 'text';
      pwd.type = isText ? 'password' : 'text';
      this.textContent = isText ? '👁' : '🙈';
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = '';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Authenticating...';

      setTimeout(() => {
        const result = NZ.loginUser(email, password);
        if (result.error) {
          alertBox.innerHTML = `<div class="alert alert-danger"><span>❌</span>${result.error}</div>`;
          btn.disabled = false;
          btn.textContent = '🚀 ENTER THE ZONE';
          return;
        }
        showToast('Login successful! Welcome back, ' + result.user.username, 'success');
        setTimeout(() => {
          if (result.user.isAdmin) window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        }, 800);
      }, 600);
    });
  </script>
</body>
</html>
